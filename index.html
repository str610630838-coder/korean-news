<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>历史杂志馆 - 从 Internet Archive 探索百年期刊</title>
  <meta name="description" content="从 Internet Archive 抓取与展示百年历史杂志，探索期刊文献宝库。搜索 Life Magazine、National Geographic、民国期刊等历史珍贵刊物。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <h1>历史杂志馆</h1>
    <p>从 Internet Archive 抓取与展示百年历史杂志，探索期刊文献宝库。</p>
  </header>

  <main class="container">
    <section class="search-panel">
      <form id="searchForm">
        <input id="searchInput" type="search" placeholder="输入关键词，例如：Life Magazine / 民国 / National Geographic" autocomplete="off" />
        <button id="searchBtn" type="submit">搜索杂志</button>
      </form>
      <div class="quick-actions">
        <button class="quick-btn" type="button" data-query="Life Magazine">Life Magazine</button>
        <button class="quick-btn" type="button" data-query="National Geographic">National Geographic</button>
        <button class="quick-btn" type="button" data-query="民国期刊">民国期刊</button>
      </div>
      <div class="status-row">
        <span id="statusText">准备搜索</span>
        <span>结果数：<strong id="resultCount">0</strong></span>
      </div>
      <div id="loading" class="loading hidden">加载中...</div>
      <div id="errorBox" class="error hidden"></div>
      <div id="magazineGrid" class="magazine-grid"></div>
    </section>
  </main>

  <footer class="footer">
    数据来源于 Internet Archive，仅供学习与研究，请遵守版权法规。
  </footer>

  <script src="script.js"></script>
</body>
</html>
