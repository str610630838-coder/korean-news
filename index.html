<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>历史文献馆 - 从 Project Gutenberg 探索百年经典</title>
  <meta name="description" content="从 Project Gutenberg 抓取与展示百年历史刊物与资料，探索无尽的公版宝库。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="header">
    <h1>📜 历史文献馆</h1>
    <p>从 Project Gutenberg 古腾堡计划探索公版典籍，点击直达原页，完美支持沉浸式翻译</p>
  </header>

  <main class="container">
    <!-- 标签导航 -->
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="search">🔍 搜索</button>
      <button class="tab-btn" data-tab="bookshelf">
        📚 我的书架
        <span id="shelfCount" class="shelf-badge" style="display:none">0</span>
      </button>
      <button class="tab-btn" data-tab="local-reader">📄 本地阅读器</button>
    </div>

    <!-- 搜索标签页 -->
    <section id="tab-search" class="tab-content active search-panel">
      <form id="searchForm">
        <input id="searchInput" type="search" placeholder="输入关键词，例如：Magazine / History / Science"
          autocomplete="off" />
        <button id="searchBtn" type="submit">搜索文献</button>
      </form>
      <div class="quick-actions">
        <button class="quick-btn" type="button" data-query="Magazine">Magazine</button>
        <button class="quick-btn" type="button" data-query="History">History</button>
        <button class="quick-btn" type="button" data-query="Science">Science</button>
      </div>
      <div class="status-row">
        <span id="statusText">准备搜索</span>
        <span>结果数：<strong id="resultCount">0</strong></span>
      </div>
      <div id="loading" class="loading hidden">加载中...</div>
      <div id="errorBox" class="error hidden"></div>
      <div id="magazineGrid" class="magazine-grid"></div>
    </section>

    <!-- 书架标签页 -->
    <section id="tab-bookshelf" class="tab-content search-panel">
      <div class="shelf-header">
        <h2>我的书架</h2>
        <span id="shelfStatus" class="shelf-status"></span>
      </div>
      <div id="shelfGrid" class="magazine-grid"></div>
    </section>

    <!-- 本地阅读器标签页 -->
    <section id="tab-local-reader" class="tab-content search-panel">
      <div class="local-reader-header">
        <h2>本地阅读器</h2>
        <p>导入 txt / md / html / htm 文件后，正文会直接渲染在页面中，方便沉浸式翻译插件识别。</p>
      </div>
      <div class="local-reader-controls">
        <label class="local-file-label" for="localFileInput">选择本地文件</label>
        <input id="localFileInput" type="file" accept=".txt,.md,.html,.htm,text/plain,text/html,text/markdown" />
        <button id="clearLocalReaderBtn" class="secondary-btn" type="button">清空内容</button>
      </div>
      <div id="localReaderStatus" class="local-reader-status">尚未导入文件</div>
      <article id="localReaderContent" class="local-reader-content">
        <p class="local-reader-empty">请选择本地文本文件开始阅读。</p>
      </article>
    </section>
  </main>

  <footer class="footer">
    数据来源于 Project Gutenberg，点击封面或阅读按钮直达原始网页，完美支持沉浸式翻译等浏览器扩展。
  </footer>

  <script src="script.js"></script>
</body>

</html>
