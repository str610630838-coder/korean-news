<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History Hub · 历史杂志档案</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="container hero">
    <h1>History Hub</h1>
    <p>历史杂志抓取与静态展示站</p>
  </header>

  <main class="container">
    <section class="toolbar">
      <input id="q" type="search" placeholder="搜索标题、主题、年份（例如：china / 1912）" />
      <button id="reloadBtn">刷新数据说明</button>
    </section>

    <p class="hint">
      数据来源：Internet Archive 元数据。<br />
      首次部署后，请运行 <code>python scripts/fetch_magazines.py</code> 生成/更新 <code>data/magazines.json</code>。
    </p>

    <section id="stats" class="stats"></section>
    <section id="grid" class="grid"></section>
  </main>

  <template id="cardTpl">
    <article class="card">
      <h3 class="title"></h3>
      <p class="meta"></p>
      <p class="desc"></p>
      <div class="tags"></div>
      <a class="link" target="_blank" rel="noopener noreferrer">查看原始条目</a>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
