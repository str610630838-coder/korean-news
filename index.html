<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>历史文献馆 - 从 Project Gutenberg 探索百年经典</title>
  <meta name="description" content="从 Project Gutenberg 抓取与展示百年历史刊物与资料，探索无尽的公版宝库。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="header">
    <h1>📜 历史文献馆</h1>
    <p>从 Project Gutenberg 古腾堡计划探索公版典籍，免 PDF 纯净阅读体验</p>
  </header>

  <main class="container">
    <!-- 标签导航 -->
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="search">🔍 搜索</button>
      <button class="tab-btn" data-tab="bookshelf">
        📚 我的书架
        <span id="shelfCount" class="shelf-badge" style="display:none">0</span>
      </button>
    </div>

    <!-- 搜索标签页 -->
    <section id="tab-search" class="tab-content active search-panel">
      <form id="searchForm">
        <input id="searchInput" type="search" placeholder="输入关键词，例如：Magazine / History / Science"
          autocomplete="off" />
        <button id="searchBtn" type="submit">搜索文献</button>
      </form>
      <div class="quick-actions">
        <button class="quick-btn" type="button" data-query="Magazine">Magazine</button>
        <button class="quick-btn" type="button" data-query="History">History</button>
        <button class="quick-btn" type="button" data-query="Science">Science</button>
      </div>
      <div class="status-row">
        <span id="statusText">准备搜索</span>
        <span>结果数：<strong id="resultCount">0</strong></span>
      </div>
      <div id="loading" class="loading hidden">加载中...</div>
      <div id="errorBox" class="error hidden"></div>
      <div id="magazineGrid" class="magazine-grid"></div>
    </section>

    <!-- 书架标签页 -->
    <section id="tab-bookshelf" class="tab-content search-panel">
      <div class="shelf-header">
        <h2>我的书架</h2>
        <span id="shelfStatus" class="shelf-status"></span>
      </div>
      <div id="shelfGrid" class="magazine-grid"></div>
    </section>
  </main>

  <footer class="footer">
    数据来源于 Project Gutenberg，采用原生 HTML/EPUB 网页渲染，完全拒绝 PDF，尽享流畅阅读体验。
  </footer>

  <!-- 全屏阅读器 -->
  <div id="readerModal" class="reader-view hidden">
    <div class="reader-header">
      <button id="closeReader" class="reader-icon-btn">✕ 关闭</button>
      <div class="reader-title-area">
        <h2 id="readerTitle" class="reader-book-title"></h2>
        <span id="readerChapterInfo" class="reader-chapter-info"></span>
      </div>
      <button id="toggleSidebar" class="reader-icon-btn">☰ 章节</button>
    </div>

    <!-- 顶部总进度条 -->
    <div class="reader-progress-bar">
      <div id="progressFill" class="reader-progress-fill"></div>
    </div>

    <div class="reader-body">
      <!-- 章节侧栏 -->
      <aside id="chapterSidebar" class="chapter-sidebar">
        <h3 class="sidebar-title">章节目录</h3>
        <ul id="chapterList" class="chapter-list"></ul>
      </aside>

      <!-- 阅读主区 -->
      <div class="reader-main">
        <div id="readerContent" class="reader-content" lang="en" translate="yes">
          <div id="chapterLoading" class="reader-loading hidden">正在加载章节…</div>
          <h2 id="chapterTitle" class="chapter-heading"></h2>
          <article id="chapterText" class="chapter-body" translate="yes"></article>
        </div>

        <div class="reader-controls">
          <button id="prevChapter" class="reader-nav-btn" disabled>← 上一章</button>
          <span id="chapterIndicator" class="chapter-indicator">— / —</span>
          <button id="nextChapter" class="reader-nav-btn" disabled>下一章 →</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
